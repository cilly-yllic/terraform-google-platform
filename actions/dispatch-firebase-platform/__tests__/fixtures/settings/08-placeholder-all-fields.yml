# Fixture: \${service} / \${env} placeholder を主要 field 全体で活用するパターン。
#
# 運用上 env / service を入れた方が良いケースの一覧:
#
#   - hosting[].site_id        : globally unique なので env / service prefix がほぼ必須
#   - apps[].display_name      : Firebase Console での見分け用 (cosmetic)
#   - app_hosting[].backend_id : project-unique。env を含めて区別しやすく
#   - storage.buckets[].name   : project_id auto-prefix なし時 (raw_name=true) は env で分離
#   - storage.firestore_backup.bucket_name : firestore backup 用 GCS バケット名
#   - firestore[].database_id  : 任意 (\"(default)\" は固定文字列なのでそのまま)
#   - data_connect[].cloud_sql.instance_id / database / service_id 等
service: graphql-svc

environments:
  dev-001:
    billing_account_id: "BBBB-BBBB-BBBB"
    firebase_platform:
      firebase: true

      apps:
        - name: main
          type: web
          display_name: "${service} ${env} Main"        # cosmetic
        - name: admin
          type: web
          display_name: "${service} ${env} Admin"

      hosting:
        - site_id: ${service}-${env}-web                 # globally unique
          app: main
        - site_id: ${service}-${env}-admin
          app: admin

      app_hosting:
        - backend_id: ${service}-${env}-api              # project-unique
          location: asia-northeast1
          app: main

      storage:
        buckets:
          - name: uploads                                # auto-prefix (project_id-uploads)
          - name: ${service}-${env}-cdn-assets           # raw_name で env 含む明示名
            raw_name: true
        firestore_backup:
          bucket_name: ${service}-${env}-firestore-backup
          export_platform: cloud_run

      firestore:
        - database_id: "(default)"                       # 固定文字列、placeholder 無し
          location: asia-northeast1
        - database_id: ${env}-analytics                  # env 別 DB
          location: asia-northeast1

      data_connect:
        - service_id: main
          location: asia-northeast1
          cloud_sql:
            instance_id: ${service}-${env}-shared-fdc
            database: ${env}-main
            tier: db-f1-micro
