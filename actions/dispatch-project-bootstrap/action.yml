name: "Dispatch TFC Project Bootstrap"
description: "Read settings.yml, upsert TFC workspace, and trigger a project-bootstrap Run"
author: "cilly-yllic"

inputs:
  service:
    description: "service name"
    required: true
  environment:
    description: >
      target environment key (e.g. "prd-001"). Optional — when omitted, the
      Action iterates over every entry in settings.environments and selects
      targets via `labels`. At least one of `environment` / `labels` must be set.
    required: false
    default: ""
  settings_path:
    description: "path to settings.yml within the calling repo"
    default: "terraform/settings.yml"
  tfc_org:
    description: "Terraform Cloud organization name"
    required: true
  tfc_workspace_name:
    description: "project-factory workspace name pattern (placeholders: {service})"
    default: "project-factory-{service}"
  parent_organization_id:
    description: "GCP Org ID (use one of organization_id or folder_id)"
    required: false
  parent_folder_id:
    description: "GCP Folder ID (use one of organization_id or folder_id)"
    required: false
  bootstrap_project_id:
    description: "Bootstrap project ID where SA is created"
    default: "infra-bootstrap"
  bootstrap_project_number:
    description: "Bootstrap project number (numeric). Required for TFC_GCP_WORKLOAD_PROVIDER_NAME."
    required: true
  workload_identity_pool_id:
    description: "Workload Identity Pool ID"
    default: "terraform-cloud"
  workload_identity_provider_id:
    description: "Workload Identity Provider ID"
    default: "terraform-cloud"
  tfc_token:
    description: "Terraform Cloud API token"
    required: true
  enable_webhook_notification:
    description: "if true, ensure TFC notification config exists for Phase 2"
    default: "false"
  cloud_run_webhook_url:
    description: "Cloud Run router URL (required when enable_webhook_notification=true)"
    required: false
  cloud_run_webhook_secret:
    description: "HMAC secret shared with Cloud Run router"
    required: false
  module_version:
    description: >
      Version constraint for the cilly-yllic/project-bootstrap/google Registry module
      written into the uploaded main.tf (e.g. "1.2.3" or "~> 1.0").
      Leave empty to omit the version attribute and always use the latest.
    required: false
    default: ""
  labels:
    description: >
      JSON array of JS RegExp pattern strings (e.g. '["^tier:dev$","^region:apne1$"]').
      Each candidate env's `labels` (from settings.yml) must match ALL patterns
      (AND) — otherwise the env is filtered out. Anchor patterns with ^...$ for
      exact match. Empty / omitted means "no label gating" (then `environment`
      input is required).
    required: false
    default: ""

outputs:
  run_id:
    description: "Terraform Cloud Run ID (empty when skipped)"
  run_url:
    description: "URL to the Run in TFC UI (empty when skipped)"
  workspace_id:
    description: "Terraform Cloud Workspace ID (empty when skipped)"
  workspace_name:
    description: "Terraform Cloud Workspace name (empty when skipped)"
  applied_envs:
    description: 'JSON array of env keys updated by this Run (e.g. ["prd-001","dev-002"])'
  state_removed_envs:
    description: >
      JSON array of env keys dropped from Terraform state without destroy
      (matched settings.retained_envs but absent from settings.environments).
      GCP resources for these envs remain — delete from the GCP console.
  destroyed_envs:
    description: >
      JSON array of env keys queued for destroy (absent from both
      settings.environments and settings.retained_envs).
  filtered_envs:
    description: >
      JSON array of {env, reason, detail} entries describing envs that were
      filtered out by status or labels gating.
  skipped:
    description: "\"true\" when no Run was created (no env changes), \"false\" otherwise"
  skip_reason:
    description: "Reason code when skipped=true: no_changes (empty otherwise)"

runs:
  using: "node20"
  main: "dist/index.js"
