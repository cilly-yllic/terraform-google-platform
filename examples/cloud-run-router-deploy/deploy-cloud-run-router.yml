name: Deploy cloud-run-router

# ============================================================================
# ⚠️ これは **reference workflow** です。
#
# 本ファイルは `examples/` 配下に置かれており、GitHub Actions には自動拾い
# 上げ**されません**。本リポジトリで実 deploy 用途には使われません。
#
# 推奨の利用方法:
#   1. このファイルを fork ユーザーの **private な deploy 用 repo** にコピー
#      (例: <your-org>/infrastructure 等)
#   2. 配置先: `.github/workflows/deploy-cloud-run-router.yml`
#   3. 必要に応じて `SOURCE_REPO` / region / service 名等を調整
#   4. `scripts/bootstrap.sh` の opt-in セットアップで作成した WIF Provider の
#      `attribute.repository == "<your-org>/<your-deploy-repo>"` を、
#      **deploy 用 private repo に向けて**おくこと
#   5. private repo 側の Variables / Secrets を設定:
#      - Variables: GCP_PROJECT_ID / GCP_WORKLOAD_IDENTITY_PROVIDER /
#                   GCP_DEPLOY_SERVICE_ACCOUNT / GCP_RUNTIME_SERVICE_ACCOUNT /
#                   GH_APP_ID
#      - Secrets:   DEPLOY_WEBHOOK (Slack incoming webhook URL)
#
# 詳細: examples/cloud-run-router-deploy/README.md
# ============================================================================
#
# 運用方針:
#   - source repo (cilly-yllic/terraform-google-platform) で
#     `cloud-run-router-v<semver>` 形式のタグを切る (例: cloud-run-router-v1.0.0)
#   - private deploy repo にコピーした本 workflow を Actions 画面から
#     `workflow_dispatch` で起動
#   - 入力欄にタグ名を指定
#   - main の祖先に含まれる commit のタグかを検証してから build / deploy
#
# 前提 (一度だけセットアップ):
#   1. `make bootstrap` を ENABLE_CLOUD_RUN_DEPLOY_SETUP=true で実行済み
#      → deploy SA / runtime SA / GitHub WIF Provider が作成済み
#   2. `make bootstrap-print-env` の出力を GitHub repo の
#      Settings → Secrets and variables → Actions → Variables に登録:
#        - GCP_PROJECT_ID
#        - GCP_WORKLOAD_IDENTITY_PROVIDER
#        - GCP_DEPLOY_SERVICE_ACCOUNT
#        - GCP_RUNTIME_SERVICE_ACCOUNT
#        - GH_APP_ID                ← GitHub App ID (Secret ではなく Variable で可)
#                                     GitHub の予約により `GITHUB_` prefix の
#                                     Variable / Secret 名は作成不可なので
#                                     `GH_` prefix を使用
#   3. Secret Manager に runtime 用 secret を作成:
#        gcloud secrets create tfc-notification-secret \
#          --data-file=<(printf '%s' "$TFC_HMAC_SECRET") \
#          --project=$GCP_PROJECT_ID
#        gcloud secrets create github-app-private-key \
#          --data-file=path/to/github-app-private-key.pem \
#          --project=$GCP_PROJECT_ID

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "main にあるタグ名 (例: cloud-run-router-v1.0.0)"
        required: true
        type: string

permissions:
  contents: read
  id-token: write   # WIF 用 OIDC token を発行するために必須

# 同時 deploy 防止 (前の deploy 完了を待つ; 進行中の deploy は取り消さない)
concurrency:
  group: deploy-cloud-run-router
  cancel-in-progress: false

env:
  # ↓ private deploy repo にコピーした場合、ここを自リポジトリの source repo に
  #    変更してください (本リポジトリを fork している場合は <your-org>/<fork-name>)。
  SOURCE_REPO: cilly-yllic/terraform-google-platform
  SERVICE_NAME: cloud-run-router
  REGION: asia-northeast1
  IMAGE_REPO: gcr.io   # gcr.io alias 経由で Artifact Registry に push される

jobs:
  deploy:
    name: Build & deploy ${{ inputs.tag }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repo at tag
        # SOURCE_REPO の指定 tag を fetch-depth=0 で取得 (祖先チェックのため履歴必要)。
        # source repo が public なら token 不要。private の場合は token を追加する。
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Validate tag is reachable from source main
        # 別ブランチに切られたタグからの deploy を防ぐ。
        # actions/checkout@v4 の origin = SOURCE_REPO になっているので、
        # origin/main = SOURCE_REPO の main を指す。
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          MAIN_SHA=$(git rev-parse FETCH_HEAD)
          TAG_SHA=$(git rev-parse "${{ inputs.tag }}^{commit}")
          if ! git merge-base --is-ancestor "${TAG_SHA}" "${MAIN_SHA}"; then
            echo "::error::Tag ${{ inputs.tag }} (${TAG_SHA}) is not reachable from ${{ env.SOURCE_REPO }} main (${MAIN_SHA})."
            exit 1
          fi
          echo "Tag ${{ inputs.tag }} confirmed on ${{ env.SOURCE_REPO }} main (commit ${TAG_SHA})."

      - name: Authenticate to GCP via Workload Identity Federation
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Build & push container image
        working-directory: cloud-run-router
        run: |
          set -euo pipefail
          IMAGE="${{ env.IMAGE_REPO }}/${{ vars.GCP_PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ inputs.tag }}"
          echo "Building image: ${IMAGE}"
          gcloud builds submit \
            --tag "${IMAGE}" \
            --project="${{ vars.GCP_PROJECT_ID }}"
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Sync runtime secrets to GCP Secret Manager
        # GitHub Secrets を single source of truth として、毎 deploy で
        # Secret Manager に新 version を追加する。Cloud Run service の新 revision
        # は `:latest` を読むので、自動的に最新値が runtime に反映される。
        #
        # 前提:
        #   - `make bootstrap` (ENABLE_CLOUD_RUN_DEPLOY_SETUP=true) で
        #     Secret Manager の container 2 つは既に作成済み
        #   - deploy SA に `roles/secretmanager.secretVersionAdder` 付与済み
        env:
          TFC_NOTIFICATION_SECRET: ${{ secrets.TFC_NOTIFICATION_SECRET }}
          GH_APP_PRIVATE_KEY: ${{ secrets.GH_APP_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          if [[ -z "${TFC_NOTIFICATION_SECRET}" ]]; then
            echo "::error::secrets.TFC_NOTIFICATION_SECRET is not set in this repository/org"
            exit 1
          fi
          if [[ -z "${GH_APP_PRIVATE_KEY}" ]]; then
            echo "::error::secrets.GH_APP_PRIVATE_KEY is not set in this repository/org"
            exit 1
          fi
          printf '%s' "${TFC_NOTIFICATION_SECRET}" | gcloud secrets versions add tfc-notification-secret \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --data-file=- > /dev/null
          printf '%s' "${GH_APP_PRIVATE_KEY}" | gcloud secrets versions add github-app-private-key \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --data-file=- > /dev/null
          echo "Synced TFC_NOTIFICATION_SECRET → tfc-notification-secret and GH_APP_PRIVATE_KEY → github-app-private-key (new versions added)."

      - name: Deploy to Cloud Run
        run: |
          set -euo pipefail
          gcloud run deploy "${{ env.SERVICE_NAME }}" \
            --image "${IMAGE}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --platform=managed \
            --service-account="${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}" \
            --set-secrets="TFC_NOTIFICATION_SECRET=tfc-notification-secret:latest,GITHUB_APP_PRIVATE_KEY=github-app-private-key:latest" \
            --set-env-vars="GITHUB_APP_ID=${{ vars.GH_APP_ID }},METADATA_SOURCE=run_message,DISPATCH_EVENT_TYPE=firebase_platform_requested" \
            --allow-unauthenticated

      - name: Capture deployed metadata
        # 後続の summary / Slack 通知の両方で URL と revision 名を使うので、
        # describe を 1 回だけ実行して step outputs に乗せる。
        id: meta
        run: |
          set -euo pipefail
          SERVICE_URL=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.url)')
          SERVICE_REVISION=$(gcloud run services describe "${{ env.SERVICE_NAME }}" \
            --project="${{ vars.GCP_PROJECT_ID }}" \
            --region="${{ env.REGION }}" \
            --format='value(status.latestReadyRevisionName)')
          {
            echo "service_url=${SERVICE_URL}"
            echo "service_revision=${SERVICE_REVISION}"
          } >> "${GITHUB_OUTPUT}"
          echo "::notice::Deployed ${{ inputs.tag }} to ${SERVICE_URL} (revision: ${SERVICE_REVISION})"

      - name: Write step summary
        if: success()
        run: |
          {
            echo "## Deployment Summary"
            echo ""
            echo "- **Tag**: \`${{ inputs.tag }}\`"
            echo "- **Image**: \`${IMAGE}\`"
            echo "- **Cloud Run URL**: ${{ steps.meta.outputs.service_url }}"
            echo "- **Latest revision**: \`${{ steps.meta.outputs.service_revision }}\`"
            echo "- **TFC Notification destination**: ${{ steps.meta.outputs.service_url }}/webhook"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Notify Slack on success
        # deploy 自体は成功している状態で通知に失敗しても workflow 全体は成功扱いに
        # したい (Slack 障害でデプロイ完了を覆さない) ため continue-on-error。
        if: success()
        continue-on-error: true
        env:
          SLACK_WEBHOOK: ${{ secrets.DEPLOY_WEBHOOK }}
          DEPLOY_TAG: ${{ inputs.tag }}
          SERVICE_URL: ${{ steps.meta.outputs.service_url }}
          SERVICE_REVISION: ${{ steps.meta.outputs.service_revision }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          # Slack Block Kit を jq で組み立てて curl で POST。
          # bash の heredoc 内で `\`...\`` を扱うとシェルがバックティックを
          # 評価してしまうので jq で組み立てる方が安全。
          jq -n \
            --arg tag "${DEPLOY_TAG}" \
            --arg revision "${SERVICE_REVISION}" \
            --arg url "${SERVICE_URL}" \
            --arg run_url "${RUN_URL}" \
            --arg run_num "${RUN_NUMBER}" \
            '{
              blocks: [
                {
                  type: "header",
                  text: {type: "plain_text", text: ":rocket: cloud-run-router deployed", emoji: true}
                },
                {
                  type: "section",
                  fields: [
                    {type: "mrkdwn", text: "*Tag*\n`\($tag)`"},
                    {type: "mrkdwn", text: "*Revision*\n`\($revision)`"},
                    {type: "mrkdwn", text: "*Service URL*\n<\($url)>"},
                    {type: "mrkdwn", text: "*TFC Notification destination*\n<\($url)/webhook>"}
                  ]
                },
                {
                  type: "context",
                  elements: [
                    {type: "mrkdwn", text: "Workflow: <\($run_url)|run #\($run_num)>"}
                  ]
                }
              ]
            }' \
            | curl -fsS -X POST -H 'Content-Type: application/json' \
                -d @- "${SLACK_WEBHOOK}"
