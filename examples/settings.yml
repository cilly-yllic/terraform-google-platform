# =============================================================================
# settings.yml — shared by Action A (dispatch-project-bootstrap) and
#                                Action B (dispatch-firebase-platform).
# Lives in the service's own repository as the single source of truth.
# -----------------------------------------------------------------------------
# Naming convention
#   project_id    = "${service}-${env_key}"   (env_key IS the suffix)
#   tfc workspace = "${service}-${env_key}"   (Action B's target workspace)
#   sa id         = "terraform-${service}-${env_key}"   (≤ 30 chars, GCP limit)
#
# Field ownership
#   service                                 → A & B   (naming root)
#   folder_id (optional)                    → A       (service 用 folder。B は不要)
#   environments.<env_key>                  → A & B   (env_key = project_id suffix)
#   environments.<env_key>.status             → A & B  (active|inactive, default active)
#   environments.<env_key>.labels             → A & B  (string[], default [])
#   environments.<env_key>.billing_account_id → A    (B does not need it)
#   environments.<env_key>.firebase_platform → B    (A passes through, ignores)
#
# Per-environment gating
#   status: inactive  → the Action skips this env (success-skip with warning).
#                       Use it to keep config for an env that you don't yet want
#                       to provision (cost control during early development).
#   labels: [...]     → free-form tags. When the caller passes `labels:` input
#                       to the Action (JSON array of regex patterns, e.g.
#                       '["^tier:dev$","^region:apne1$"]'), the env must match
#                       ALL patterns (AND) to run; otherwise the Action skips.
#                       Patterns are JS RegExp — anchor with ^...$ for an
#                       exact match.
#
# Top-level retained_envs
#   string[]; lists env keys that must NEVER be destroyed by Terraform even
#   if removed from `environments:`. When such an env disappears from
#   `environments:` but appears in `retained_envs`, the Action emits a
#   `removed { lifecycle { destroy = false } }` block so the env is dropped
#   from Terraform state but the underlying GCP project survives (delete
#   it later from the GCP console). Envs that are absent from BOTH
#   `environments:` AND `retained_envs` are fully destroyed on the next
#   Run — the intended flow for dev environments that are casually created
#   and torn down. Recommendation: add production envs to `retained_envs`
#   the moment they're provisioned, as a safety net against accidental
#   removal from `environments:`.
#
# firebase_platform.apps / hosting / app_hosting (array スキーマ)
#   いずれも複数 entry を 1 project 内に登録できる array 型。
#   apps (Firebase App 登録 / app_id 発行):
#     - name (内部参照キー、type 跨いで unique、rename = destroy-recreate なので immutable 扱い)
#     - type ("web" | "ios" | "android")
#     - display_name (optional, Firebase Console 表示用、省略時 name 流用)
#     # type=web 専用 field なし
#     # type=ios 専用: bundle_id (必須), app_store_id (optional), team_id (optional)
#     # type=android 専用: package_name (必須), sha1_hashes (optional), sha256_hashes (optional)
#   hosting:
#     - site_id (URL の subdomain, globally unique)
#     - app (どの apps[].name に link するか。type=web のみ参照可、単数なら省略可)
#   app_hosting:
#     - backend_id (Firebase Console title, project-unique)
#     - location (省略時は var.region)
#     - app (link 先 apps[].name、type=web のみ、単数なら省略可)
#     - app_id (外部 Web App を pin する場合のみ、app と排他)
#     - service_account (省略時は project 共有の default SA を 1 個 auto-create)
#     - serving_locality ("GLOBAL_ACCESS" or "REGION_LOCKED", default 前者)
#   ※ apps 自体を省略しても hosting / app_hosting があれば "default" 名で
#     type=web を 1 件 auto-create + 自動 link される。複数 web app + 参照省略
#     は plan-time error (silent reference flip 防止)。hosting / app_hosting
#     から iOS / Android app は参照不可 (Firebase 仕様)。
# =============================================================================

service: my-service

# service 用 GCP folder の数値 ID (任意)。指定すると、このサービスの全 project が
# この folder 配下に作られる (Action A の parent_folder_id input より優先)。
# folder は **事前に作成**し (例: `gcloud resource-manager folders create
# --display-name=my-service --folder=<root_folder_id>`)、その数値 ID をここに入れる。
# 重要: bootstrap の root folder (Factory SA が projectCreator/projectIamAdmin を
# 持つ folder) の配下に置くこと。grant が継承で届かないと per-env SA への owner
# 付与が失敗する。詳細: docs/project-bootstrap/design/iam-policy.md
# folder_id: "123456789012"

# Envs listed here are protected from `terraform destroy` even if they are
# removed from `environments:` below — the Action drops them from state
# only, leaving the GCP project intact for manual cleanup.
retained_envs:
  - prd-001

# YAML anchors let you DRY-share firebase_platform config across multiple
# dev-NNN environments. Drop the anchor block if you don't need it.
_anchors:
  dev_firebase: &dev_firebase
    firebase: true
    authentication: true
    # firestore は array。"(default)" は SDK の default 動作で必要なら含める。
    firestore:
      - database_id: "(default)"
        location: asia-northeast1
        type: FIRESTORE_NATIVE
    storage: null
    # 開発環境は Hosting / App Hosting / Data Connect 無し。
    # 本番側で多 service / 多 backend を検証する例は prd-001 を参照。
    apps: null
    hosting: null
    app_hosting: null
    data_connect: null
    fcm: true
    remote_config: true
    crashlytics: true
    analytics: true
    secret_manager: true
    cloud_run: true
    cloud_functions: true
    region: asia-northeast1

environments:

  # ---------------------------------------------------------------------------
  # prd-001 — production. project_id = my-service-prd-001
  #
  # 多 app (web/iOS/Android) + 多 hosting + 多 app_hosting を活用したケース。
  # 1 project の中で main (ユーザー向け) と admin (運用向け) の 2 アプリを
  # 同居させる構成 + 将来 iOS / Android を増やす想定の例。
  # ---------------------------------------------------------------------------
  prd-001:
    status: active
    labels:
      - tier:prd
      - region:apne1
    billing_account_id: "AAAAAA-AAAAAA-AAAAAA"
    firebase_platform:
      firebase: true
      authentication: true

      # Firestore database (1 project に複数 DB 可)。"(default)" は SDK の default
      # 動作で必要なら含める。analytics / logs は別 region で隔離。
      firestore:
        - database_id: "(default)"
          location: asia-northeast1
          type: FIRESTORE_NATIVE
        - database_id: analytics
          location: us-central1
        - database_id: logs
          location: us-central1
          delete_protection_state: DELETE_PROTECTION_ENABLED
          point_in_time_recovery: true

      storage:
        buckets:
          - name: uploads

      # Firebase Apps (Web / iOS / Android 登録、analytics / auth 紐付け用)。
      # name は type 跨いで unique。hosting / app_hosting は type=web の name
      # だけ参照できる。display_name は Firebase Console 表示名。
      apps:
        - name: main
          type: web
          display_name: "Main Web App"
        - name: admin
          type: web
          display_name: "Admin Console"
        # 将来 iOS / Android を増やす時のコメントアウト例:
        # - name: main-ios
        #   type: ios
        #   bundle_id: com.mooodone.main
        #   display_name: "Main iOS"
        #   app_store_id: "123456789"    # optional
        #   team_id: "ABCDE12345"        # optional
        # - name: main-android
        #   type: android
        #   package_name: com.mooodone.main
        #   display_name: "Main Android"
        #   sha1_hashes:                 # optional, App Check / Dynamic Links 用
        #     - "DA:39:..."

      # Hosting site (静的ホスティング)。site_id がそのまま URL の subdomain
      # (globally unique)。1 project に複数 site OK、各 site は別の web app に
      # link 可能 (`app:` field で apps[].name の type=web のものを指す)。
      hosting:
        - site_id: my-service-prd-001-web      # https://my-service-prd-001-web.web.app
          app: main
        - site_id: my-service-prd-001-admin    # https://my-service-prd-001-admin.web.app
          app: admin

      # App Hosting backend (Cloud Run ベースの動的ホスティング)。
      # backend_id がそのまま Firebase Console のタイトル + terraform 上の ID。
      # default SA (firebase-app-hosting-compute) は project 単位 1 個を全
      # backend で共有 (service_account を全 backend で省略する場合)。
      app_hosting:
        - backend_id: api                       # API backend (multi-region でなくて OK)
          location: asia-northeast1
          app: main
        - backend_id: jobs                      # 非同期 worker (region 違いも OK)
          location: us-central1
          app: main
          serving_locality: REGION_LOCKED
        - backend_id: admin-api                 # admin 用 backend → admin web_app に link
          location: asia-northeast1
          app: admin

      # Data Connect services。同 instance_id を指す entries は自動 dedup されて
      # 1 Cloud SQL Instance に集約 (コスト最適化)。
      # 共有 instance を使う場合、tier / database_version / deletion_protection /
      # location は全 entries で一致必須 (precondition で plan-time check)。
      data_connect:
        - service_id: main
          location: asia-northeast1
          cloud_sql:
            instance_id: shared-fdc           # ← 同 instance を共有
            database: main
            tier: db-custom-2-4096            # instance 単位 → 全 entries 同値
            database_version: POSTGRES_15
        - service_id: analytics
          location: asia-northeast1
          cloud_sql:
            instance_id: shared-fdc           # ← 同 instance、別 database
            database: analytics
        - service_id: jobs                     # 別 region 用に独立 instance
          location: us-central1
          cloud_sql:
            instance_id: jobs-fdc
            database: jobs
            tier: db-f1-micro

      fcm: true
      remote_config: true
      app_check: true
      crashlytics: true
      performance: true
      analytics: true
      extensions: true
      secret_manager: true
      cloud_tasks:
        location: asia-northeast1
      cloud_scheduler:
        location: asia-northeast1
      pubsub: true
      eventarc:
        location: asia-northeast1
      cloud_run: true
      cloud_functions: true
      region: asia-northeast1
      ci_service_account:
        account_id: ci-deploy
        display_name: CI/CD Deployment (prd-001)

  # ---------------------------------------------------------------------------
  # stg-001 — staging. project_id = my-service-stg-001
  # status: inactive — config is kept in sync with prd, but no infra is
  # provisioned yet. Flip to "active" (or omit, since active is the default)
  # when the team is ready to bring staging up.
  # ---------------------------------------------------------------------------
  stg-001:
    status: inactive
    labels:
      - tier:stg
      - region:apne1
    billing_account_id: "AAAAAA-AAAAAA-AAAAAA"
    firebase_platform:
      firebase: true
      authentication: true
      firestore:
        - database_id: "(default)"
          location: asia-northeast1
          type: FIRESTORE_NATIVE
        - database_id: analytics-db
          location: asia-northeast1

      # ↓ シンプル構成: apps を省略すると "default" 名で type=web を 1 件
      # auto-create + auto-link される。hosting / app_hosting の `app:` も
      # 省略可 (type=web の app が 1 件のみ)。
      hosting:
        - site_id: my-service-stg-001-web
      app_hosting:
        - backend_id: api
          location: asia-northeast1

      fcm: true
      remote_config: true
      app_check: true
      crashlytics: true
      analytics: true
      secret_manager: true
      cloud_run: true
      cloud_functions: true
      region: asia-northeast1

  # ---------------------------------------------------------------------------
  # dev-001 / dev-002 — share the dev_firebase anchor.
  # project_id = my-service-dev-001 / my-service-dev-002
  # Add new dev-NNN entries here as the team grows.
  # ---------------------------------------------------------------------------
  dev-001:
    # status defaults to "active" when omitted.
    labels:
      - tier:dev
      - region:apne1
    billing_account_id: "BBBBBB-BBBBBB-BBBBBB"
    firebase_platform: *dev_firebase

  dev-002:
    labels:
      - tier:dev
      - region:usc1
    billing_account_id: "BBBBBB-BBBBBB-BBBBBB"
    # Same base, override one nested field
    firebase_platform:
      <<: *dev_firebase
      firestore:
        - database_id: "(default)"
          location: us-central1
          type: FIRESTORE_NATIVE
